resources:
  jobs:
    lakeflow_job_worker:
      name: "[${bundle.target}] ${var.app_name}-worker"
      description: "Inference worker — one serverless run per submitted job"

      max_concurrent_runs: ${var.worker_max_concurrent_runs}

      tasks:
        - task_key: run_worker
          spark_python_task:
            python_file: ../worker/worker.py
            # DAB silently drops task-level environment_variables for serverless jobs.
            # All config is passed as CLI parameters instead; worker.py injects them
            # into os.environ before any helper module reads them.
            parameters:
              - "--job_id"
              - "{{job.parameters.job_id}}"
              - "--lakebase_project_id"
              - "${var.lakebase_project_id}"
              - "--lakebase_branch_id"
              - "${var.lakebase_branch_id}"
              - "--lakebase_db_name"
              - "${var.lakebase_db_name}"
              - "--foundation_model_name"
              - "{{job.parameters.foundation_model_name}}"
              - "--flush_every"
              - "${var.flush_every}"
              - "--mlflow_experiment_name"
              - "/Workspace/Users/${workspace.current_user.userName}/${var.app_name}-${bundle.target}"
          environment_key: worker_env
          # No new_cluster → serverless compute

      environments:
        - environment_key: worker_env
          spec:
            client: "1"
            dependencies:
              - "psycopg[binary]>=3.0"
              - openai
              - "databricks-sdk>=0.81.0"
              - "colorlog>=6.0"
              - "mlflow>=2.10.0"

      # job_id is set per-run by the app; foundation_model_name defaults from the DAB variable
      # and can be overridden at run time. Using job.parameters for values that may be empty
      # strings — DAB renders empty-string variables as null in Terraform arrays (panic), but
      # job.parameters defaults are runtime-resolved and handle "" correctly.
      parameters:
        - name: job_id
          default: ""
        - name: foundation_model_name
          default: ${var.foundation_model_name}

      health:
        rules:
          - metric: RUN_DURATION_SECONDS
            op: GREATER_THAN
            value: 3600

      email_notifications:
        on_failure:
          - ${var.notification_email}
