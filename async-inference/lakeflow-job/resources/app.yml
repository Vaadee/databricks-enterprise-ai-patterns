resources:
  apps:
    lakeflow_job_app:
      name: ${var.app_name}-${bundle.target}
      description: "Async long-running inference gateway"
      source_code_path: ../app

      # Grant the app permission to trigger the worker job.
      # Databricks Apps injects {name}_id as an env var → WORKER_JOB_ID.
      resources:
        - name: WORKER_JOB
          job:
            id: ${resources.jobs.lakeflow_job_worker.id}
            permission: CAN_MANAGE_RUN
