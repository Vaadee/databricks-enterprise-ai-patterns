resources:
  jobs:
    lakeflow_job_reconciler:
      name: "[${bundle.target}] ${var.app_name}-reconciler"
      description: "Re-triggers stale jobs and recovers stuck RUNNING/STREAMING jobs — runs every 5 min"

      schedule:
        quartz_cron_expression: ${var.reconciler_cron}
        timezone_id: "UTC"
        pause_status: UNPAUSED

      tasks:
        - task_key: reconcile
          spark_python_task:
            python_file: ../infra/reconciler/reconciler.py
            # DAB silently drops task-level environment_variables for serverless jobs.
            # All config is passed as CLI parameters; reconciler.py injects them into os.environ.
            parameters:
              - "--lakebase_project_id"
              - "${var.lakebase_project_id}"
              - "--lakebase_branch_id"
              - "${var.lakebase_branch_id}"
              - "--lakebase_db_name"
              - "${var.lakebase_db_name}"
              - "--worker_job_id"
              - "${resources.jobs.lakeflow_job_worker.id}"
              - "--stale_pending_minutes"
              - "${var.stale_pending_minutes}"
              - "--stale_running_minutes"
              - "${var.stale_running_minutes}"
              - "--stale_streaming_minutes"
              - "${var.stale_streaming_minutes}"
          environment_key: reconciler_env
          # No new_cluster → serverless compute

      environments:
        - environment_key: reconciler_env
          spec:
            client: "1"
            dependencies:
              - "psycopg[binary]>=3.0"
              - "databricks-sdk>=0.81.0"
              - "colorlog>=6.0"

      email_notifications:
        on_failure:
          - ${var.notification_email}
