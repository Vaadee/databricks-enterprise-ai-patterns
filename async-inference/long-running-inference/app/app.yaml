# Databricks Apps runtime config.
# Static env vars go here. Dynamic values (job IDs, secrets) go in resources/app.yml.
command:
  - "uvicorn"
  - "app:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"

env:
  - name: WORKER_JOB_ID
    valueFrom: WORKER_JOB
  - name: LAKEBASE_PROJECT_ID
    value: "long-running-inference"
  - name: LAKEBASE_BRANCH_ID
    value: "production"
  - name: LAKEBASE_DB_NAME
    value: "databricks_postgres"
  - name: AZURE_API_VERSION
    value: "2024-02-01"
  - name: FLUSH_EVERY
    value: "1000"
  - name: TOKEN_REFRESH_SECS
    value: "3000"
  - name: DB_POOL_SIZE
    value: "5"
  - name: DB_POOL_MAX_OVERFLOW
    value: "10"
